name: abara
description: "Abrar shop"

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'


dependencies:
  flutter:
    sdk: flutter



  cupertino_icons: ^1.0.6
  firebase_core: ^3.2.0
  cloud_firestore: ^5.1.0
  fluttertoast: ^8.2.5
  intl: ^0.19.0
  firebase_storage: ^12.1.1
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  image_cropper: ^7.1.0
  go_router: ^14.2.1
#  camera: ^0.11.0+1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Telenor
      fonts:
        - asset: assets/fonts/Telenor-Bold.ttf
          weight: 700
        - asset: assets/fonts/Telenor-Medium.ttf
          weight: 500
        - asset: assets/fonts/Telenor-Light.ttf
          weight: 300

    - family: HindSiliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-SemiBold.ttf
          weight: 700

        - asset: assets/fonts/HindSiliguri-Regular.ttf
          weight: 500


  
  
  
  

  
  

  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
